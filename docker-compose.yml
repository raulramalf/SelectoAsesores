services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: selecto_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - selecto_net

  nginx:
    image: nginx:1.25-alpine
    container_name: selecto_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - selecto_net

  postgres:
    image: postgres:16-alpine
    container_name: selecto_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: selectoasesores
      POSTGRES_USER: rauldeveloper
      POSTGRES_PASSWORD: '2d'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - selecto_net

  redis:
    image: redis:7-alpine
    container_name: selecto_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - selecto_net

  node:
    image: node:20-alpine
    container_name: selecto_node
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app
    networks:
      - selecto_net

  n8n:
    image: n8nio/n8n:latest
    container_name: selecto_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/Madrid
      - WEBHOOK_URL=http://localhost:5678
      - N8N_USER_MANAGEMENT_DISABLED=true
      - N8N_USER_MANAGEMENT_DISABLED=true
      - N8N_USER_MANAGEMENT_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - selecto_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  selecto_net:
    driver: bridge
